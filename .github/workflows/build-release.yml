name: Build and Release

# Tag creation is blocked for github-actions[bot] by the org-level
# `restrict-tag-pushing` ruleset, so the release (and its tag) is created
# with a token minted for the release GitHub App -- the same app
# java-questdb-client uses to push its Maven release tags.
# One-time setup, NOT enforceable from this file:
#   * The app must be installed on this repository with Contents: read/write.
#   * Repository variable RELEASE_GITHUB_APP_CLIENT_ID and repository secret
#     RELEASE_GITHUB_APP_PRIVATE_KEY must identify that app.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name'
        required: true
        type: string

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: read    # GITHUB_TOKEN only; the release is created with the app token.
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binfmt-support qemu-user-static

      - name: Build binaries
        run: ./build.sh

      - name: Test binaries
        run: |
          ./test.sh gosu-amd64
          ./test.sh gosu-i386
          ./test.sh --debian gosu-amd64
          ./test.sh --debian gosu-i386

      - name: Run govulncheck
        run: |
          for gosu in gosu-*; do
            ./govulncheck-with-excludes.sh -mode=binary "$gosu"
          done

      - name: Create release GitHub App token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            gosu-*
            SHA256SUMS
